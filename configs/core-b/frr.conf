frr version 10.7
frr defaults traditional
hostname core-b
log stdout informational
service integrated-vtysh-config
!
interface lo
 description Router ID
 ip address 10.255.0.3/32
 ip ospf area 0
!
interface eth1
 description Transit to edge-west
 ip address 10.0.13.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 3
!
interface eth2
 description Transit to edge-east
 ip address 10.0.34.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 3
!
interface eth3
 description Higher-cost core interconnect
 ip address 10.0.23.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf cost 50
 ip ospf hello-interval 1
 ip ospf dead-interval 3
!
router ospf
 ospf router-id 10.255.0.3
 passive-interface default
 no passive-interface eth1
 no passive-interface eth2
 no passive-interface eth3
 maximum-paths 2
!
line vty
!
end
