name: validate-lab

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate addressing, topology, configs, and verifier
        run: python -m unittest discover -s tests -v

  integration-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Containerlab 0.77.0
        run: |
          archive=containerlab_0.77.0_linux_amd64.tar.gz
          curl --fail --silent --show-error --location \
            --output "/tmp/${archive}" \
            "https://github.com/srl-labs/containerlab/releases/download/v0.77.0/${archive}"
          curl --fail --silent --show-error --location \
            --output /tmp/checksums.txt \
            "https://github.com/srl-labs/containerlab/releases/download/v0.77.0/checksums.txt"
          cd /tmp
          grep " ${archive}$" checksums.txt | sha256sum --check
          sudo tar -xzf "${archive}" -C /usr/local/bin containerlab
          containerlab version
      - name: Deploy four-router FRR topology
        run: sudo containerlab deploy --topo topology.clab.yml --reconfigure
      - name: Verify OSPF, inject failure, and measure recovery
        run: python3 scripts/verify_lab.py --report evidence/ci-run.json
      - name: Upload verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: ospf-verification-evidence
          path: evidence/ci-run.json
      - name: Destroy lab
        if: always()
        run: sudo containerlab destroy --topo topology.clab.yml --cleanup
